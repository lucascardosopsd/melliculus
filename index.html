<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Melliculus · Brigadeiros Gourmet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --gold: rgba(255,255,255,0.07);
      --border: rgba(255,255,255,0.22);
      --text-dim: rgba(255,255,255,0.45);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: #000;
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      justify-content: center;
      padding: 0 0 64px;
    }

    /* Page wrapper */
    .page {
      width: 100%;
      max-width: 460px;
      padding: 0 24px;
      opacity: 0;
      animation: fadeIn 1.4s cubic-bezier(.4,0,.2,1) .1s forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Logo ── */
    .logo-wrap {
      padding: 56px 0 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .logo-name {
      font-family: 'Great Vibes', cursive;
      font-size: 3.6rem;
      line-height: 1;
      letter-spacing: 0.02em;
      color: #fff;
      text-shadow:
        0 0 40px rgba(255,255,255,0.18),
        0 0 80px rgba(255,255,255,0.06);
    }

    .logo-sub {
      font-family: 'Montserrat', sans-serif;
      font-weight: 400;
      font-size: 0.6rem;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    /* ── Social Buttons ── */
    .btn-social {
      display: flex;
      align-items: center;
      width: 100%;
      height: 60px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: rgba(255,255,255,0.03);
      text-decoration: none;
      color: #fff;
      overflow: hidden;
      transition: all 0.35s cubic-bezier(.4,0,.2,1);
      position: relative;
      backdrop-filter: blur(4px);
    }

    .btn-social::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 999px;
      background: radial-gradient(ellipse at center, rgba(255,255,255,0.04) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.35s;
    }

    .btn-social:hover {
      border-color: rgba(255,255,255,0.28);
      background: rgba(255,255,255,0.06);
      box-shadow: 0 0 24px rgba(255,255,255,0.07), 0 0 1px rgba(255,255,255,0.2) inset;
      transform: translateY(-1px);
    }

    .btn-social:hover::before { opacity: 1; }

    .btn-icon {
      width: 60px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-divider {
      width: 1px;
      height: 28px;
      background: var(--border);
      flex-shrink: 0;
    }

    .btn-label {
      flex: 1;
      text-align: center;
      font-family: 'Montserrat', sans-serif;
      font-weight: 400;
      text-transform: uppercase;
      color: rgba(255,255,255,0.78);
      padding-right: 12px;
    }

    /* ── Carousel ── */
    .carousel-wrap {
      position: relative;
      border-radius: 32px;
      overflow: hidden;
      border: 1.5px solid var(--border);
      aspect-ratio: 4/5;
      background: #0a0a0a;
    }

    .carousel-track {
      display: flex;
      height: 100%;
      transition: transform 0.85s cubic-bezier(.77,0,.18,1);
      will-change: transform;
    }

    .carousel-slide {
      flex: 0 0 100%;
      height: 100%;
      position: relative;
    }

    .carousel-slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .carousel-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.08) 0%,
        rgba(0,0,0,0.0) 40%,
        rgba(0,0,0,0.32) 100%
      );
    }

    .carousel-dots {
      position: absolute;
      bottom: 18px;
      left: 0; right: 0;
      display: flex;
      justify-content: center;
      gap: 6px;
    }

    .dot {
      width: 5px;
      height: 5px;
      border-radius: 999px;
      background: rgba(255,255,255,0.3);
      transition: all 0.4s cubic-bezier(.4,0,.2,1);
    }

    .dot.active {
      background: rgba(255,255,255,0.9);
      width: 18px;
    }

    /* ── Institutional text ── */
    .text-block {
      text-align: center;
      padding: 8px 8px 0;
    }

    .text-line-sm {
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      font-size: 0.78rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
      line-height: 2;
    }

    .text-line-cursive {
      font-family: 'Great Vibes', cursive;
      font-size: 2.2rem;
      color: rgba(255,255,255,0.92);
      line-height: 1.3;
      text-shadow: 0 0 30px rgba(255,255,255,0.12);
    }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .div-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--border), transparent);
    }

    .div-heart {
      font-size: 0.62rem;
      color: rgba(255,255,255,0.28);
      line-height: 1;
    }

    /* ── Location ── */
    .location {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .loc-text {
      font-family: 'Montserrat', sans-serif;
      font-weight: 400;
      text-transform: uppercase;
      color: var(--text-dim);
    }
  </style>
</head>
<body>

<main class="page">

  <!-- ── Logo ── -->
  <div class="logo-wrap">
    <span class="logo-name">Melliculus</span>
    <span class="logo-sub">brigadeiros gourmet</span>
  </div>

  <!-- ── Buttons ── -->
  <div style="display:flex;flex-direction:column;gap:12px;margin-bottom:36px;">

    <a class="btn-social" href="https://www.instagram.com/melliculus_docecg" target="_blank" rel="noopener">
      <span class="btn-icon">
        <!-- Instagram SVG -->
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
          <circle cx="12" cy="12" r="4"/>
          <circle cx="17.5" cy="6.5" r=".5" fill="currentColor" stroke="none"/>
        </svg>
      </span>
      <span class="btn-divider"></span>
      <span class="btn-label">@melliculus_docecg</span>
    </a>

    <a class="btn-social" href="https://wa.me/5567996641461?text=Ol%C3%A1%2C%20vim%20pelo%20seu%20contato" target="_blank" rel="noopener">
      <span class="btn-icon">
        <!-- WhatsApp SVG -->
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
        </svg>
      </span>
      <span class="btn-divider"></span>
      <span class="btn-label">Peça pelo WhatsApp</span>
    </a>

    <button class="btn-social" id="pixBtn" onclick="copyPix()" style="cursor:pointer;width:100%;border:1.5px solid var(--border);">
      <span class="btn-icon">
        <img src="https://2i1d0j2eaz.ufs.sh/f/VhhRAJChvXTstoo7xCQnXj20TLSHVpei9oGYrJK8PUDld3sx" alt="Pix" width="22" height="22" style="object-fit:contain;" />
      </span>
      <span class="btn-divider"></span>
      <span class="btn-label" id="pixLabel">Copiar chave Pix</span>
    </button>

  </div>

  <!-- ── Carousel ── -->
  <div class="carousel-wrap" id="carousel" style="margin-bottom:40px;">
    <div class="carousel-track" id="carouselTrack">

      <div class="carousel-slide">
        <img src="https://2i1d0j2eaz.ufs.sh/f/VhhRAJChvXTshK8PIq5xDLfdBpsklrE0QP6Ra9neA8NFv3Ct" alt="Brigadeiros gourmet" loading="eager" />
        <div class="carousel-overlay"></div>
      </div>

      <div class="carousel-slide">
        <img src="https://2i1d0j2eaz.ufs.sh/f/VhhRAJChvXTs5B6WzswJR8qeUj64HBIbyrcloW7pmAZx1dK3" alt="Brigadeiros gourmet" loading="lazy" />
        <div class="carousel-overlay"></div>
      </div>

    </div>

    <!-- Dots -->
    <div class="carousel-dots" id="carouselDots"></div>
  </div>

  <!-- ── Institutional text ── -->
  <div class="text-block" style="margin-bottom:44px;">
    <p class="text-line-sm">Brigadeiros gourmet para festas</p>
    <p class="text-line-sm">ou para simplesmente</p>
    <p class="text-line-cursive">alegrar o seu dia!</p>
  </div>

  <!-- ── Divider ── -->
  <div class="divider" style="margin-bottom:36px;">
    <span class="div-line"></span>
    <span class="div-heart">♥</span>
    <span class="div-line"></span>
  </div>

  <!-- ── Location ── -->
  <div class="location">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.38)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
      <circle cx="12" cy="10" r="3"/>
    </svg>
    <span class="loc-text">Campo Grande · MS</span>
  </div>

</main>

<!-- ── Toast ── -->
<div id="toast" style="
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.18);
  color: #fff;
  font-family: 'Montserrat', sans-serif;
  font-weight: 400;
  font-size: 0.72rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  padding: 14px 28px;
  border-radius: 999px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.35s ease, transform 0.35s ease;
  white-space: nowrap;
  z-index: 999;
">Chave Pix copiada!</div>

<script>
  (function () {
    const track   = document.getElementById('carouselTrack');
    const dotsEl  = document.getElementById('carouselDots');
    const slides  = track.querySelectorAll('.carousel-slide');
    const total   = slides.length;
    let current   = 0;
    let timer;

    slides.forEach((_, i) => {
      const d = document.createElement('span');
      d.className = 'dot' + (i === 0 ? ' active' : '');
      dotsEl.appendChild(d);
    });

    const dots = dotsEl.querySelectorAll('.dot');

    function goTo(n) {
      dots[current].classList.remove('active');
      current = (n + total) % total;
      track.style.transform = `translateX(-${current * 100}%)`;
      dots[current].classList.add('active');
    }

    function next() { goTo(current + 1); }

    function startTimer() {
      clearInterval(timer);
      timer = setInterval(next, 4000);
    }

    let startX = 0;
    track.addEventListener('touchstart', e => {
      startX = e.touches[0].clientX;
      clearInterval(timer);
    }, { passive: true });

    track.addEventListener('touchend', e => {
      const diff = startX - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 40) diff > 0 ? next() : goTo(current - 1);
      startTimer();
    }, { passive: true });

    startTimer();
  })();

  let toastTimer;
  function copyPix() {
    navigator.clipboard.writeText('4b716515-77c5-4b4e-aec0-1efb40c896e8');
    const toast = document.getElementById('toast');
    clearTimeout(toastTimer);
    toast.style.opacity = '1';
    toast.style.transform = 'translateX(-50%) translateY(0)';
    toastTimer = setTimeout(() => {
      toast.style.opacity = '0';
      toast.style.transform = 'translateX(-50%) translateY(20px)';
    }, 3000);
  }
</script>

</body>
</html>
